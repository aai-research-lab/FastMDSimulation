# Minimal protein‚Äìligand example (OpenFF Sage 2.x ligand with OpenMM)

project: ProteinLigand

defaults:
  engine: openmm
  platform: auto     # auto‚ÜíCUDA‚ÜíOpenCL‚ÜíCPU; set CPU to force
  temperature_K: 300
  timestep_fs: 2.0
  constraints: HBonds
  forcefield: ["amber14/protein.ff14SB.xml", "amber14/tip3p.xml"]
  box_padding_nm: 1.0
  ionic_strength_molar: 0.15
  report_interval: 1000
  checkpoint_interval: 5000

stages:
  - { name: minimize,   steps: 0 }
  - { name: nvt,        steps: 5000, ensemble: NVT }
  - { name: npt,        steps: 5000, ensemble: NPT }
  - { name: production, steps: 10000, ensemble: NPT }

systems:
  - id: protein_ligand
    pdb: protein.pdb          # replace with your protein structure
    ligand: ligand.sdf        # SDF or MOL2; OpenFF Sage 2.x parameterization
    ligand_charge: 0
    ligand_name: LIG
    # keep_heterogens: true    # retain heterogens/waters during PDB fixing
